<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 px-4">

  <div class="w-full max-w-5xl bg-white rounded-2xl shadow-xl grid md:grid-cols-2 overflow-hidden">

    <!-- LEFT SIDE (Branding) -->
    <div class="hidden md:flex flex-col justify-center bg-primary text-white p-10">
      <h2 class="text-3xl font-bold mb-4">Welcome Back</h2>
      <p class="text-sm opacity-90 mb-6">
        Login to access your dashboard and manage your projects efficiently.
      </p>

      <ul class="space-y-3 text-sm">
        <li>✔ Secure Access</li>
        <li>✔ Project Tracking</li>
        <li>✔ Real-time Updates</li>
      </ul>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="p-8 md:p-10">

      <h2 class="text-2xl font-bold text-gray-800 mb-6">Login</h2>

      <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-5">

        <!-- EMAIL -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full px-4 py-2.5 border rounded-md focus:ring-2 focus:ring-primary outline-none"
          />

          <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
             class="text-red-500 text-xs mt-1">
            Valid email is required
          </p>
        </div>

        <!-- PASSWORD -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>

          <div class="relative">
            <input
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="Enter your password"
              class="w-full px-4 py-2.5 border rounded-md focus:ring-2 focus:ring-primary outline-none"
            />

            <button type="button"
              (click)="hidePassword = !hidePassword"
              class="absolute right-3 top-2.5 text-sm text-gray-500">
              {{ hidePassword ? 'Show' : 'Hide' }}
            </button>
          </div>

          <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
             class="text-red-500 text-xs mt-1">
            Minimum 6 characters required
          </p>
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center space-x-2">
            <input type="checkbox" formControlName="remember" />
            <span>Remember me</span>
          </label>

          <a href="#" class="text-primary hover:underline">
            Forgot password?
          </a>
        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="w-full bg-primary text-white py-2.5 rounded-md font-semibold hover:bg-accent transition">

          <span *ngIf="!isSubmitting">Login</span>
          <span *ngIf="isSubmitting">Please wait...</span>
        </button>

      </form>

      <!-- FOOTER -->
      <p class="text-sm text-center text-gray-600 mt-6">
        Don't have an account?
        <a href="#" class="text-primary font-medium hover:underline">Register</a>
      </p>

    </div>

  </div>

</section>
